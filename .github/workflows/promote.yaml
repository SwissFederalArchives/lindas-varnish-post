name: Promote and Rollback

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - promote-to-int
          - promote-to-prod
          - rollback-test
          - rollback-int
          - rollback-prod
        default: promote-to-int
      source_tag:
        description: "Full source image tag (e.g., test_2026-02-17_112056 for promote-to-int, int_2026-02-23_091442 for promote-to-prod, or any env tag for rollback)"
        required: true
        type: string

env:
  IMAGE: ghcr.io/swissfederalarchives/lindas-varnish-post

jobs:
  promote-to-int:
    if: github.ref == 'refs/heads/main' && inputs.action == 'promote-to-int'
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create INT tag
        id: docker_tag
        run: echo "tag=int_$(date '+%Y-%m-%d_%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Retag image for INT
        run: |
          echo "Promoting ${{ inputs.source_tag }} to ${{ steps.docker_tag.outputs.tag }}"
          docker buildx imagetools create \
            --tag ${{ env.IMAGE }}:${{ steps.docker_tag.outputs.tag }} \
            ${{ env.IMAGE }}:${{ inputs.source_tag }}

  promote-to-prod:
    if: github.ref == 'refs/heads/main' && inputs.action == 'promote-to-prod'
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PROD tag
        id: docker_tag
        run: echo "tag=prod_$(date '+%Y-%m-%d_%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Retag image for PROD
        run: |
          echo "Promoting ${{ inputs.source_tag }} to ${{ steps.docker_tag.outputs.tag }}"
          docker buildx imagetools create \
            --tag ${{ env.IMAGE }}:${{ steps.docker_tag.outputs.tag }} \
            ${{ env.IMAGE }}:${{ inputs.source_tag }}

  rollback-test:
    if: github.ref == 'refs/heads/main' && inputs.action == 'rollback-test'
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create TEST rollback tag
        id: docker_tag
        run: echo "tag=test_$(date '+%Y-%m-%d_%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Retag image for TEST
        run: |
          echo "Rolling back to ${{ inputs.source_tag }} as ${{ steps.docker_tag.outputs.tag }}"
          docker buildx imagetools create \
            --tag ${{ env.IMAGE }}:${{ steps.docker_tag.outputs.tag }} \
            ${{ env.IMAGE }}:${{ inputs.source_tag }}

  rollback-int:
    if: github.ref == 'refs/heads/main' && inputs.action == 'rollback-int'
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create INT rollback tag
        id: docker_tag
        run: echo "tag=int_$(date '+%Y-%m-%d_%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Retag image for INT
        run: |
          echo "Rolling back to ${{ inputs.source_tag }} as ${{ steps.docker_tag.outputs.tag }}"
          docker buildx imagetools create \
            --tag ${{ env.IMAGE }}:${{ steps.docker_tag.outputs.tag }} \
            ${{ env.IMAGE }}:${{ inputs.source_tag }}

  rollback-prod:
    if: github.ref == 'refs/heads/main' && inputs.action == 'rollback-prod'
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PROD rollback tag
        id: docker_tag
        run: echo "tag=prod_$(date '+%Y-%m-%d_%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Retag image for PROD
        run: |
          echo "Rolling back to ${{ inputs.source_tag }} as ${{ steps.docker_tag.outputs.tag }}"
          docker buildx imagetools create \
            --tag ${{ env.IMAGE }}:${{ steps.docker_tag.outputs.tag }} \
            ${{ env.IMAGE }}:${{ inputs.source_tag }}
